<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div:nth-child(1){
            background-color: red;

            grid-column: 2;
            grid-row: 1/3;
        }

         div:nth-child(2){
            background-color: purple;

            grid-column: 3/4;
            grid-row: 2;
        }
        
         div:nth-child(3){
            background-color: brown;

            grid-column: 2;
            grid-row: 2/4;
        }

         div:nth-child(4){
            background-color: green;

            grid-column: 1/3;
            grid-row: 2;
        }

        body{
            display: grid;
            
            grid-template-columns: 150px 75px 150px;
            grid-template-rows: 150px 75px 150px;

            /*grid-auto-rows: 250px;
            grid-auto-columns: 100px;*/
            justify-content: center;
            align-content: center;
        }
    </style>
</head>

<body>
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
     <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
<link rel="manifest" href="images/site.webmanifest">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/checkout.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <title>Checkout</title>

</head>
<body>
     <header>
    <h1>Checkout</h1>
    <img class="logo" src="images/caflog.png" alt="Logo of Cafe">
     <a href="Menu.html"target="_blank">Back to Menu</a>
    </header>

    <table>
        <tbody>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Discounts?</th>
                <th>Reviews</th>
            </tr>
            <tr>
                <td>Item 1</td>
                <td>45.67$</td>
                <td>n/a</td>
                <td>3.4 stars</td>
            </tr>
                        <tr>
                <td>Item 2</td>
                <td>15.99$</td>
                <td>20%</td>
                <td>4 stars</td>
            </tr>
                        <tr>
                <td>Item 3</td>
                <td>99.99$</td>
                <td>15%</td>
                <td>5 stars</td>
            </tr>
            <caption>Summary of Purchases</caption>

        </tbody>
    </table>

    <section>
        <h1 class="review">Leave a review!</h1>
    <form>
       Name: <input type="text" name="Name" id="name">
       Comment: <input type="text" name="Comment" id="comment">
        <button>Submit</button>
    </form>
        </section>
</body>
</html>
